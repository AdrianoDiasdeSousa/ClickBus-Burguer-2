<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - ClickBus Burguer</title>
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/login.css" />
  </head>

  <body>
    <header class="topo">
      <a href="index.html" class="area-logo">
        <img src="img/logo-topo.png" alt="Logo ClickBus Burguer" />
      </a>

      <a href="index.html" class="botao-voltar">↩ Voltar</a>
    </header>

    <main class="pagina-login">
      <section class="login-container">
        <h1>Seja bem-vindo!</h1>
        <p>Faça login para acessar sua conta</p>

        <form class="form-login" onsubmit="fazerLogin(event)">
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="Digite seu email"
            autocomplete="email"
            required
          />

          <label for="senha">Senha</label>
          <div class="campo-senha">
            <input
              type="password"
              id="senha"
              name="senha"
              placeholder="Digite sua senha"
              autocomplete="current-password"
              required
            />

            <button
              type="button"
              class="botao-ver-senha"
              onclick="alternarVisibilidadeSenha('senha', this)"
              aria-label="Mostrar senha"
              title="Mostrar senha"
            >
              👁️
            </button>
          </div>

          <button type="submit" class="botao-entrar">Entrar</button>
        </form>

        <a href="cadastro.html" class="botao-cadastro">
          Não tem conta? Cadastre-se
        </a>

        <a href="recuperar-senha.html" class="botao-recuperar">
          Recuperar senha
        </a>
      </section>
    </main>

    <script src="api.js"></script>
    <script src="script.js"></script>
  </body>
</html>
