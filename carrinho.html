<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Carrinho - ClickBus Burguer</title>

    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/carrinho.css" />
  </head>

  <body>
    <header class="topo">
      <a href="index.html" class="area-logo">
        <img src="img/logo-topo.png" alt="Logo ClickBus Burguer" />
      </a>
    </header>

    <main class="pagina-carrinho">
      <section class="carrinho-container">
        <button type="button" class="btn-limpar" onclick="limparCarrinho()">
          🗑 Limpar
        </button>

        <div class="box-carrinho">
          <h1>Carrinho</h1>

          <div id="listaCarrinho" class="lista-carrinho"></div>

          <div class="resumo-carrinho">
            <div class="resumo-card">
              Valor Total: <span id="valorTotalCarrinho">R$ 0,00</span>
            </div>

            <div class="resumo-card">
              Total de Produtos <span id="totalProdutosCarrinho">00</span>
            </div>
          </div>
        </div>

        <div class="acoes-carrinho">
          <a href="cardapio.html" class="btn-adicionar">
            Adicionar mais produtos
          </a>

          <button type="button" class="btn-avancar" onclick="avancarCarrinho()">
            Avançar
          </button>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
